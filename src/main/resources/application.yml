# =============================================================================
# Seller & Identity Service — Base Configuration (All Environments)
# =============================================================================

spring:
  application:
    name: seller-identity-service

  # --- Graceful Shutdown ---
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # --- DataSource (PostgreSQL + HikariCP) ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: identity-db-pool

  # --- JPA / Hibernate ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: false
    validate-on-migrate: true

  # --- Jackson ---
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

# --- Server ---
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

# --- Actuator ---
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true
    java:
      enabled: true

# --- Logging ---
logging:
  level:
    root: INFO
    com.marketplace.selleridentity: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.zaxxer.hikari: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"

# --- JWT ---
app:
  jwt:
    secret: change-me-in-production-minimum-32-characters
    expiration-seconds: 3600
