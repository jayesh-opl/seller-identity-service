# =============================================================================
# Seller & Identity Service — Test Profile
# =============================================================================
# Activate: @ActiveProfiles("test") on test classes
# Requires: Local PostgreSQL with database 'identity_db_test'
# Setup: CREATE DATABASE identity_db_test;
# =============================================================================

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/identity_db_test
    username: test
    password: test
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

# --- Server (random port prevents conflicts) ---
server:
  port: 0

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health

# --- Logging (quiet) ---
logging:
  level:
    root: WARN
    com.marketplace.selleridentity: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
